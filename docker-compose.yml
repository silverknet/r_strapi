# Local PostgreSQL only. Production (e.g. Railway) uses managed Postgres — not this file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: r_strapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: strapi
    ports:
      # If 5432 is in use: use "5433:5432" and set PGPORT=5433 in .env
      - "5432:5432"
    volumes:
      - strapi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  strapi_pgdata:
